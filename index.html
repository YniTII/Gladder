                document.getElementById('elementPropertiesModal').style.display = 'flex';
            },

            hideElementPropertiesModal() {
                document.getElementById('elementPropertiesModal').style.display = 'none';
            },

            saveElementProperties() {
                const tag = document.getElementById('elementTag').value.trim();
                const type = document.getElementById('elementType').value;
                const comment = document.getElementById('elementComment').value.trim();
                
                if (tag && appState.editingElement) {
                    const { rungIndex, branchIndex, colIndex, element } = appState.editingElement;
                    
                    // Валидация тега
                    if (!/^[IQM]\w+$/.test(tag)) {
                        alert('Неверный формат тега. Пример: I0.0, Q1, M10');
                        return;
                    }
                    
                    // Обновляем элемент
                    element.tag = tag;
                    element.comment = comment;
                    
                    // Регистрируем тег в реестре, если его нет
                    appState.tagRegistry.register(tag, type, false, comment);
                    
                    // Добавляем элемент в ветку
                    const rung = appState.rungs[rungIndex];
                    const branch = rung.branches[branchIndex];
                    
                    // Проверяем, есть ли уже элемент в этой ячейке
                    const existingIndex = branch.elements.findIndex(el => el.col === colIndex);
                    if (existingIndex !== -1) {
                        branch.elements[existingIndex] = element;
                    } else {
                        branch.elements.push(element);
                    }
                    
                    // Сортируем элементы по колонке
                    branch.elements.sort((a, b) => a.col - b.col);
                    
                    this.hideElementPropertiesModal();
                    this.render();
                    TagsManager.updateTagsList();
                }
            },

            render() {
                const container = document.getElementById('editorGrid');
                container.innerHTML = '';
                
                appState.rungs.forEach((rung, rungIndex) => {
                    const rungDiv = document.createElement('div');
                    rungDiv.className = 'rung-container';
                    rungDiv.innerHTML = `
                        <div class="rung-header">
                            <span>Линия ${rungIndex + 1}</span>
                            <button onclick="LDEditor.deleteRung(${rungIndex})" class="btn" style="padding: 4px 8px;">Удалить</button>
                        </div>
                    `;
                    
                    rung.branches.forEach((branch, branchIndex) => {
                        const branchDiv = document.createElement('div');
                        branchDiv.className = 'branch-container';
                        
                        // Левая шина
                        const leftRail = document.createElement('div');
                        leftRail.className = 'rail';
                        leftRail.style.height = '40px';
                        
                        // Контент ветки
                        const contentDiv = document.createElement('div');
                        contentDiv.className = 'branch-content';
                        
                        // Создаем ячейки для элементов
                        for (let col = 0; col < 15; col++) {
                            const cell = document.createElement('div');
                            cell.className = 'grid-cell';
                            cell.dataset.rung = rungIndex;
                            cell.dataset.branch = branchIndex;
                            cell.dataset.col = col;
                            
                            // Проверяем, есть ли элемент в этой ячейке
                            const element = branch.elements.find(el => el.col === col);
                            if (element) {
                                const elementDiv = document.createElement('div');
                                elementDiv.className = `element ${element.type}`;
                                
                                // Обновляем состояние элемента на основе тега
                                if (element.tag) {
                                    const tagInfo = appState.tagRegistry.getTagInfo(element.tag);
                                    if (tagInfo) {
                                        if (tagInfo.effectiveValue) {
                                            elementDiv.classList.add('active');
                                        }
                                        if (tagInfo.isOverridden) {
                                            elementDiv.classList.add('override');
                                        }
                                    }
                                }
                                
                                // Обработчик клика для редактирования
                                elementDiv.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    appState.editingElement = {
                                        rungIndex,
                                        branchIndex,
                                        colIndex: col,
                                        element: element
                                    };
                                    this.showElementPropertiesModal(element);
                                });
                                
                                // Кнопка удаления
                                const deleteBtn = document.createElement('button');
                                deleteBtn.className = 'element-delete-btn';
                                deleteBtn.textContent = '×';
                                deleteBtn.onclick = (e) => {
                                    e.stopPropagation();
                                    this.deleteElement(rungIndex, branchIndex, col);
                                };
                                elementDiv.appendChild(deleteBtn);
                                
                                // Тег элемента
                                if (element.tag) {
                                    const tagSpan = document.createElement('div');
                                    tagSpan.className = 'element-tag';
                                    tagSpan.textContent = element.tag;
                                    elementDiv.appendChild(tagSpan);
                                }
                                
                                cell.appendChild(elementDiv);
                            } else {
                                // Ячейка пустая - может принимать перетаскивание
                                cell.addEventListener('dragover', (e) => {
                                    e.preventDefault();
                                    if (appState.draggedType) {
                                        cell.classList.add('droppable');
                                    }
                                });
                                
                                cell.addEventListener('dragleave', (e) => {
                                    cell.classList.remove('droppable');
                                });
                                
                                cell.addEventListener('drop', (e) => {
                                    e.preventDefault();
                                    cell.classList.remove('droppable');
                                    
                                    if (appState.draggedType) {
                                        this.addElementToCell(rungIndex, branchIndex, col, appState.draggedType);
                                    }
                                });
                            }
                            
                            contentDiv.appendChild(cell);
                        }
                        
                        // Правая шина
                        const rightRail = document.createElement('div');
                        rightRail.className = 'rail';
                        rightRail.style.height = '40px';
                        
                        branchDiv.appendChild(leftRail);
                        branchDiv.appendChild(contentDiv);
                        branchDiv.appendChild(rightRail);
                        rungDiv.appendChild(branchDiv);
                    });
                    
                    // Кнопка добавления ветки
                    const addBranchBtn = document.createElement('button');
                    addBranchBtn.className = 'btn';
                    addBranchBtn.style.marginTop = '5px';
                    addBranchBtn.textContent = '+ Добавить ветку';
                    addBranchBtn.onclick = () => LDEditor.addBranch(rungIndex);
                    rungDiv.appendChild(addBranchBtn);
                    
                    container.appendChild(rungDiv);
                });
            },

            deleteElement(rungIndex, branchIndex, colIndex) {
                if (appState.simulationRunning || !confirm('Удалить элемент?')) return;
                
                const rung = appState.rungs[rungIndex];
                const branch = rung.branches[branchIndex];
                
                // Удаляем элемент из массива
                const elementIndex = branch.elements.findIndex(el => el.col === colIndex);
                if (elementIndex !== -1) {
                    branch.elements.splice(elementIndex, 1);
                }
                
                this.render();
            },

            addBranch(rungIndex) {
                if (appState.simulationRunning) return;
                
                const newBranch = {
                    id: Date.now(),
                    startIndex: 0,
                    elements: []
                };
                appState.rungs[rungIndex].branches.push(newBranch);
                this.render();
            },

            deleteRung(rungIndex) {
                if (appState.simulationRunning || !confirm('Удалить линию?')) return;
                
                appState.rungs.splice(rungIndex, 1);
                this.render();
            },

            updateElementStates() {
                // Обновляем состояния всех элементов на основе тегов
                appState.rungs.forEach(rung => {
                    rung.branches.forEach(branch => {
                        branch.elements.forEach(element => {
                            if (element.tag) {
                                const tagInfo = appState.tagRegistry.getTagInfo(element.tag);
                                if (tagInfo) {
                                    element.state = tagInfo.effectiveValue;
                                }
                            }
                        });
                    });
                });
                
                // Перерисовываем
                this.render();
            }
        };

        // Менеджер тегов
        const TagsManager = {
            updateTagsList() {
                const container = document.getElementById('tagsBody');
                container.innerHTML = '';
                
                for (const [tag, info] of appState.tagRegistry.tags) {
                    const row = document.createElement('div');
                    row.className = 'tag-row';
                    row.onclick = () => appState.tagRegistry.toggle(tag);
                    
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'tag-info';
                    
                    // Определяем класс для отображения состояния
                    let valueClass = info.effectiveValue ? 'true' : 'false';
                    if (info.isOverridden) {
                        valueClass += ' override';
                    }
                    
                    infoDiv.innerHTML = `
                        <div>${tag}</div>
                        <div><small>${info.type}: ${info.comment}</small></div>
                        <div class="tag-value ${valueClass}">${info.effectiveValue ? 'TRUE' : 'FALSE'}</div>
                    `;
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'tag-actions';
                    
                    const invertBtn = document.createElement('button');
                    invertBtn.className = 'btn';
                    invertBtn.textContent = '🔄';
                    invertBtn.title = 'Инвертировать';
                    invertBtn.onclick = (e) => {
                        e.stopPropagation();
                        appState.tagRegistry.toggle(tag);
                        this.updateTagsList();
                    };
                    
                    const resetBtn = document.createElement('button');
                    resetBtn.className = 'btn';
                    resetBtn.textContent = '↺';
                    resetBtn.title = 'Сбросить override';
                    resetBtn.onclick = (e) => {
                        e.stopPropagation();
                        appState.tagRegistry.setOverride(tag, false);
                        this.updateTagsList();
                    };
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'btn';
                    removeBtn.textContent = '❌';
                    removeBtn.title = 'Удалить';
                    removeBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.removeTag(tag);
                    };
                    
                    actionsDiv.appendChild(invertBtn);
                    actionsDiv.appendChild(resetBtn);
                    actionsDiv.appendChild(removeBtn);
                    
                    row.appendChild(infoDiv);
                    row.appendChild(actionsDiv);
                    container.appendChild(row);
                }
            },

            removeTag(tag) {
                if (confirm(`Удалить тег ${tag}?`)) {
                    appState.tagRegistry.tags.delete(tag);
                    this.updateTagsList();
                }
            },

            toggle() {
                const manager = document.getElementById('tagsManager');
                manager.classList.toggle('open');
            }
        };

        // UI обработчики
        function setupEventListeners() {
            // Кнопка Start/Stop
            document.getElementById('startBtn').addEventListener('click', () => {
                appState.simulationRunning = !appState.simulationRunning;

                const btn = document.getElementById('startBtn');
                const indicator = document.querySelector('.status-indicator');

                if (appState.simulationRunning) {
                    btn.textContent = '■ STOP';
                    btn.classList.add('active');
                    indicator.className = 'status-indicator status-running';

                    lastSimulationTime = performance.now();
                    animationFrameId = requestAnimationFrame(simulationLoop);
                } else {
                    btn.textContent = '▶ START';
                    btn.classList.remove('active');
                    indicator.className = 'status-indicator status-stopped';

                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }

                    // Сбросим состояния при остановке
                    resetOutputs();
                }
            });

            // Добавление новой линии
            document.getElementById('addRungBtn').addEventListener('click', () => {
                if (appState.simulationRunning) return;
                
                appState.rungs.push({
                    id: Date.now(),
                    branches: [{
                        id: Date.now() + 1,
                        startIndex: 0,
                        elements: []
                    }]
                });
                LDEditor.render();
            });

            // Очистка схемы
            document.getElementById('clearBtn').addEventListener('click', () => {
                if (appState.simulationRunning || !confirm('Очистить всю схему?')) return;
                
                appState.rungs = [];
                initializeSchema();
                initGameObjects(); // Обязательно пересоздаём игровые объекты
                LDEditor.render();
                TagsManager.updateTagsList();
            });

            // Модальное окно свойств
            document.getElementById('saveElementBtn').addEventListener('click', () => {
                LDEditor.saveElementProperties();
            });

            document.getElementById('cancelElementBtn').addEventListener('click', () => {
                LDEditor.hideElementPropertiesModal();
            });

            document.getElementById('elementPropertiesModal').addEventListener('click', (e) => {
                if (e.target.id === 'elementPropertiesModal') {
                    LDEditor.hideElementPropertiesModal();
                }
            });

            // Модальное окно игровых объектов
            document.getElementById('saveGameObjectBtn').addEventListener('click', () => {
                saveGameObjectProperties();
            });

            document.getElementById('cancelGameObjectBtn').addEventListener('click', () => {
                document.getElementById('gameObjectPropertiesModal').style.display = 'none';
            });

            document.getElementById('deleteGameObjectBtn').addEventListener('click', () => {
                if (appState.editingElement) {
                    deleteGameObject(appState.editingElement.id);
                    document.getElementById('gameObjectPropertiesModal').style.display = 'none';
                }
            });

            document.getElementById('gameObjectPropertiesModal').addEventListener('click', (e) => {
                if (e.target.id === 'gameObjectPropertiesModal') {
                    document.getElementById('gameObjectPropertiesModal').style.display = 'none';
                }
            });

            // Менеджер тегов
            document.getElementById('tagsManagerBtn').addEventListener('click', () => {
                TagsManager.toggle();
            });

            document.getElementById('closeTagsBtn').addEventListener('click', () => {
                TagsManager.toggle();
            });

            // Палитра игровых элементов
            document.getElementById('gamePaletteBtn').addEventListener('click', () => {
                document.getElementById('gamePalette').classList.add('open');
            });

            document.getElementById('closePaletteBtn').addEventListener('click', () => {
                document.getElementById('gamePalette').classList.remove('open');
            });

            // Кнопки в палитре
            document.querySelectorAll('.game-object-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    addGameObject(btn.dataset.type);
                    document.getElementById('gamePalette').classList.remove('open');
                });
            });

            // Обработчики для окна игры
            document.getElementById('gameCollapseBtn').addEventListener('click', () => {
                const windowEl = document.getElementById('gameWindow');
                const collapsed = !appState.gameObjects.window.collapsed;
                appState.gameObjects.window.collapsed = collapsed;
                
                if (collapsed) {
                    windowEl.style.height = '32px';
                } else {
                    windowEl.style.height = '400px';
                }
            });

            document.getElementById('gameCloseBtn').addEventListener('click', () => {
                document.getElementById('gameWindow').style.display = 'none';
            });

            // Кнопки масштабирования
            document.getElementById('zoomInBtn').addEventListener('click', () => {
                const newZoom = Math.min(appState.ui.zoom + 0.1, 3.0);
                appState.ui.zoom = newZoom;
                document.documentElement.style.setProperty('--field-zoom', newZoom.toString());
            });

            document.getElementById('zoomOutBtn').addEventListener('click', () => {
                const newZoom = Math.max(appState.ui.zoom - 0.1, 0.3);
                appState.ui.zoom = newZoom;
                document.documentElement.style.setProperty('--field-zoom', newZoom.toString());
            });

            document.getElementById('resetViewBtn').addEventListener('click', () => {
                appState.ui.zoom = 1;
                appState.ui.panX = 0;
                appState.ui.panY = 0;
                
                document.documentElement.style.setProperty('--field-zoom', '1');
                document.documentElement.style.setProperty('--field-pan-x', '0px');
                document.documentElement.style.setProperty('--field-pan-y', '0px');
            });

            // Кнопка debug-оверлея
            document.getElementById('debugOverlayBtn').addEventListener('click', () => {
                appState.ui.debugVisible = !appState.ui.debugVisible;
                document.getElementById('debugLayer').style.display = appState.ui.debugVisible ? 'block' : 'none';
            });

            // Клавиатурные сокращения
            document.addEventListener('keydown', (e) => {
                if (e.key === 'd' || e.key === 'D') {
                    appState.ui.debugVisible = !appState.ui.debugVisible;
                    document.getElementById('debugLayer').style.display = appState.ui.debugVisible ? 'block' : 'none';
                }
            });
        }

        function addGameObject(type) {
            const id = `${type}_${Date.now()}`;
            let element = null;
            
            // Определяем параметры для разных типов
            switch(type) {
                case 'conveyor':
                    element = {
                        id: id,
                        type: 'conveyor',
                        x: 100 + (appState.gameObjects.elements.filter(el => el.type === 'conveyor').length * 10),
                        y: 400,
                        width: 300,
                        height: 24,
                        tag: `Q_CONVEYOR_${Date.now()}`,
                        invertTag: `Q_INV_${Date.now()}`, // Второй тег для инверсии
                        name: 'Конвейер',
                        comment: 'Конвейерная лента'
                    };
                    break;
                case 'spawn':
                    element = {
                        id: id,
                        type: 'spawn',
                        x: 100 + (appState.gameObjects.elements.filter(el => el.type === 'spawn').length * 10),
                        y: 100,
                        width: 80,
                        height: 40,
                        tag: `Q_SPAWN_${Date.now()}`,
                        name: 'Спавн',
                        material: 'metal',
                        comment: 'Зона спавна заготовок'
                    };
                    break;
                case 'sensor':
                    element = {
                        id: id,
                        type: 'sensor',
                        x: 250 + (appState.gameObjects.elements.filter(el => el.type === 'sensor').length * 10),
                        y: 390,
                        width: 40,
                        height: 20,
                        tag: `X_SENSOR_${Date.now()}`,
                        name: 'Сенсор',
                        sensorType: 'optical',
                        comment: 'Датчик на конвейере'
                    };
                    break;
                case 'unload':
                    element = {
                        id: id,
                        type: 'unload',
                        x: 450 + (appState.gameObjects.elements.filter(el => el.type === 'unload').length * 10),
                        y: 390,
                        width: 80,
                        height: 30,
                        tag: `Q_UNLOAD_${Date.now()}`,
                        name: 'Выгрузка',
                        comment: 'Зона выгрузки'
                    };
                    break;
                case 'button':
                    element = {
                        id: id,
                        type: 'button',
                        x: 300 + (appState.gameObjects.elements.filter(el => el.type === 'button').length * 50),
                        y: 100,
                        width: 48,
                        height: 48,
                        tag: `I_BTN_${Date.now()}`,
                        name: 'Кнопка',
                        buttonType: 'momentary',
                        color: '#3b82f6',
                        comment: 'Управляющая кнопка'
                    };
                    break;
            }
            
            if (element) {
                appState.gameObjects.elements.push(element);
                syncGameObjectsToDOM();
                
                // Регистрируем теги в TagRegistry
                appState.tagRegistry.register(element.tag, 'Q', false, `${type.toUpperCase()} ${id}`);
                if (element.invertTag) {
                    appState.tagRegistry.register(element.invertTag, 'Q', false, `Инверсия ${type} ${id}`);
                }
            }
        }

        function resetOutputs() {
            // Сбросим все выходные теги
            for (const [tag, info] of appState.tagRegistry.tags) {
                if (tag.startsWith('Q_')) {
                    appState.tagRegistry.setValue(tag, false);
                }
            }

            // Сбросим состояния катушек
            for (const rung of appState.rungs) {
                for (const branch of rung.branches) {
                    for (const element of branch.elements) {
                        if (element.type === 'coil') {
                            element.state = false;
                        }
                    }
                }
            }

            // Сбросим override
            for (const [tag, info] of appState.tagRegistry.tags) {
                if (info.isOverridden) {
                    appState.tagRegistry.setOverride(tag, false);
                }
            }

            // Сбросим заготовки
            appState.gameObjects.workpieces.forEach(wp => {
                if (wp.domElement) wp.domElement.remove();
                if (wp.debugElement) wp.debugElement.remove();
            });
            appState.gameObjects.workpieces = [];

            // Обновим интерфейс
            LDEditor.render();
            TagsManager.updateTagsList();
        }

        // Инициализация приложения
        function initApp() {
            initializeSchema();
            initGameObjects(); // Обязательно вызываем инициализацию игровых объектов
            LDEditor.init();
            GameEngine.init();
            setupEventListeners();
            
            LDEditor.render();
            TagsManager.updateTagsList();
        }

        // Запуск приложения при загрузке
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
